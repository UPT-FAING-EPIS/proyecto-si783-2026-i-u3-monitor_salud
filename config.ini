[postgresql]
; Conexión al PostgreSQL de la VM — en producción usar DATABASE_URL en variables de entorno
host     = localhost
port     = 5432
user     = postgres
password = 1001
database = db_health_monitor
connect_timeout = 10

[ai]
; Proveedor de IA para el endpoint /api/integrations/chat con Skills
; provider = gemini | openai | auto | none  (none = solo keyword-matching)
provider = none
; Clave API de Google Gemini (https://aistudio.google.com/app/apikey)
gemini_api_key =
; Clave API de OpenAI (https://platform.openai.com/api-keys)
openai_api_key =
; Modelo específico (dejar vacío para usar el default: gemini-2.0-flash / gpt-4o-mini)
model =


[monitor]
; Intervalo de recolección de métricas (segundos)
refresh_interval = 10



[auth]
; Credenciales bootstrap para crear el primer usuario en la tabla auth_users
username = hashira
password = 123456

[files]
; Rutas por defecto para mostrar archivos/configuración de cada motor
postgresql_config_dir = /etc/postgresql/15/main
postgresql_data_dir   = /var/lib/postgresql/15/main
postgresql_log_dir    = /var/log/postgresql
postgresql_backup_dir = /var/backups/postgresql

mysql_config_dir = /etc/mysql
mysql_data_dir   = /var/lib/mysql
mysql_log_dir    = /var/log/mysql
mysql_backup_dir = /var/backups/mysql

sqlserver_config_dir = C:/Program Files/Microsoft SQL Server
sqlserver_data_dir   = C:/Program Files/Microsoft SQL Server/MSSQL/Data
sqlserver_log_dir    = C:/Program Files/Microsoft SQL Server/MSSQL/Log
sqlserver_backup_dir = C:/Backups/SQLServer

mongodb_config_dir = /etc
mongodb_data_dir   = /var/lib/mongodb
mongodb_log_dir    = /var/log/mongodb
mongodb_backup_dir = /var/backups/mongodb

[thresholds]
connections_warning  = 70
connections_critical = 90
cache_hit_warning    = 85
cache_hit_critical   = 70
cpu_warning          = 75
cpu_critical         = 90
mem_warning          = 80
mem_critical         = 95
